<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Features · AllSet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* AllSet palette */
    --cyan-100: #1ecdd2;
    --cyan-80: #5fd8dc;
    --cyan-20: #daf5f7;
    --cyan-10: #e8fafa;

    --sunflower-100: #f5bb4f;
    --sunflower-20: #fdf2de;

    --midnight-100: #372549;
    --midnight-80: #5f506e;
    --midnight-40: #afa8b6;
    --midnight-20: #d6d4db;

    --stone-100: #5f5a57;
    --ink-100: #2b2b2b;

    --shell-100: #f3f1eb;
    --shell-20:  #fcfcfa;
    --bg-soft: #fbfaf2;
    --white: #ffffff;

    --border: #e7e5df;
    --radius-btn: 6px;
    --radius-card: 14px;
    --radius-badge: 12px;

    --font: 'Inter', Helvetica, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--ink-100);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    /* Take the full iframe height; content scrolls inside .wrap */
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .wrap {
    /* Mobile default — 20px horizontal. Top padding moved into .sticky-header so it stays visible when stuck. */
    max-width: none;
    margin: 0 auto;
    padding: 0 20px 80px;
    /* This is the scroll container so position:sticky has something to stick to */
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    width: 100%;
  }
  /* Tablet: 810+  →  30px horizontal */
  @media (min-width: 810px) {
    .wrap { padding-left: 30px; padding-right: 30px; }
  }
  /* Laptop: 1024+ →  40px horizontal */
  @media (min-width: 1024px) {
    .wrap { padding-left: 40px; padding-right: 40px; }
  }
  /* Desktop: 1280+ → 50px horizontal, centered */
  @media (min-width: 1280px) {
    .wrap {
      padding-left: 50px;
      padding-right: 50px;
      max-width: 1280px;
    }
  }

  /* ---------- Sticky header ---------- */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--white);
    padding-top: 32px;
    padding-bottom: 22px;
  }

  /* ---------- Top controls row ---------- */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr 1fr; }
    .search { grid-column: 1 / -1; }
    .select-btn, #clear { width: 100%; }
    /* Hide tag counts to save space */
    .tab .count { display: none; }
    /* Disable sticky so it scrolls with the page */
    .sticky-header {
      position: static;
    }
  }

  /* Search bar (Figma spec: 40px, Midnight 40 border, 6px radius, Inter Regular 16/24) */
  .search { position: relative; }
  .search svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--stone-100);
    pointer-events: none;
  }
  .search input {
    width: 100%;
    height: 40px;
    padding: 0 14px 0 40px;
    border: 1px solid var(--midnight-40);
    border-radius: var(--radius-btn);
    background: var(--white);
    font-family: var(--font);
    font-weight: 400;
    font-size: 16px;
    line-height: 24px;
    color: var(--ink-100);
    transition: border-color .15s, box-shadow .15s;
  }
  .search input::placeholder { color: var(--stone-100); }
  .search input:focus {
    outline: none;
    border-color: var(--cyan-100);
    box-shadow: 0 0 0 3px var(--cyan-10);
  }

  /* Buttons */
  .btn {
    font-family: var(--font);
    font-weight: 600;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 0.28px;
    border-radius: var(--radius-btn);
    border: 1px solid;
    padding: 0 12px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background-color .15s, border-color .15s, color .15s;
    user-select: none;
  }
  .btn-lg { height: 40px; padding: 0 16px; }

  .btn-primary   { background: var(--cyan-100); border-color: var(--cyan-100); color: var(--white); }
  .btn-primary:hover  { background: var(--cyan-80); }

  .btn-tertiary  { background: var(--white); border-color: var(--midnight-40); color: var(--stone-100); }
  .btn-tertiary:hover { background: var(--cyan-10); }
  .btn-tertiary[aria-pressed="true"] { background: var(--bg-soft); }
  .btn-tertiary[aria-pressed="true"]:hover { background: var(--bg-soft); }

  .btn[disabled] { opacity: .4; cursor: not-allowed; }
  .btn[disabled]:hover { background: var(--white); }

  /* Sort button: custom button with inline label + chevron, hidden native select for UX */
  .select-btn {
    position: relative;
    cursor: pointer;
  }
  .select-btn select {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    border: 0;
    padding: 0;
    margin: 0;
    background: transparent;
    font: inherit;
    appearance: none;
    -webkit-appearance: none;
  }
  .select-chevron {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--stone-100);
  }

  /* ---------- Tag tabs ---------- */
  .tabs-row {
    position: relative;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tabs {
    flex: 1;
    min-width: 0;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 0 0 auto; }
  .tab .count {
    font-size: 12px;
    font-weight: 500;
    opacity: .65;
    margin-left: 2px;
  }

  /* Scroll-arrow icon-only tertiary buttons */
  .tab-scroll {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    padding: 0;
  }
  .tab-scroll svg {
    width: 18px;
    height: 18px;
    display: block;
  }
  .tab-scroll[hidden] { display: none; }

  /* ---------- Status badges ---------- */
  .statuses {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 0;
  }
  .badge {
    font-family: var(--font);
    font-weight: 500;
    font-size: 12px;
    line-height: 16px;
    color: var(--stone-100);
    border-radius: var(--radius-badge);
    padding: 3px 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--white);
    border: 1px solid transparent;
  }

  button.badge {
    cursor: pointer;
    font-family: var(--font);
    transition: border-color .15s, filter .15s;
  }
  button.badge:hover { filter: brightness(.96); }
  button.badge[aria-pressed="true"] { border-color: var(--stone-100); }

  /* Filter-badge colors per status (Stone text throughout) */
  .badge[data-status="live"]    { background: var(--cyan-10); }
  .badge[data-status="beta"]    { background: var(--midnight-20); }
  .badge[data-status="dev"]     { background: var(--sunflower-20); }
  .badge[data-status="pipeline"] { background: var(--shell-100); }

  /* ---------- Results meta ---------- */
  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 0 18px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--stone-100);
  }
  .meta .count-big { color: var(--ink-100); font-weight: 600; }

  /* ---------- Grid + cards ---------- */
  .grid {
    display: grid;
    /* Mobile: 1 column */
    grid-template-columns: 1fr;
    gap: 14px;
  }
  /* Tablet: 2 columns */
  @media (min-width: 810px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  /* Laptop + Desktop: 3 columns */
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  .card {
    background: var(--shell-20);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--midnight-40); }
  .card-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .status-icon {
    flex: 0 0 auto;
    width: 24px; height: 24px;
    display: block;
  }
  /* Card icon color per status */
  .card[data-status="live"]    .status-icon { color: var(--cyan-100); }
  .card[data-status="beta"]    .status-icon { color: var(--midnight-100); }
  .card[data-status="dev"]     .status-icon { color: var(--sunflower-100); }
  .card[data-status="pipeline"] .status-icon { color: var(--shell-100); }

  .card-title {
    font-weight: 700;
    font-size: 15.5px;
    line-height: 1.35;
    letter-spacing: -.01em;
    margin: 0;
    color: var(--ink-100);
  }
  .card-desc {
    font-size: 14px;
    color: var(--stone-100);
    line-height: 1.55;
    margin: 0;
  }
  .card-foot {
    margin-top: auto;
    padding-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .tag {
    font-family: var(--font);
    font-size: 11px;
    color: var(--stone-100);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--white);
  }

  /* ---------- Load more ---------- */
  .load-more-wrap {
    display: flex;
    justify-content: center;
    margin-top: 24px;
  }

  /* ---------- Promo cards (always-on below feature grid) ---------- */
  .promos {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 32px;
  }
  @media (min-width: 810px) {
    .promos { grid-template-columns: repeat(2, 1fr); }
  }
  .promo {
    padding: 22px;
    border-radius: var(--radius-card);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .promo[data-promo="faq"]     { background: var(--sunflower-20); }
  .promo[data-promo="pricing"] { background: var(--cyan-10); }
  .promo .status-icon {
    width: 24px;
    height: 24px;
    color: var(--ink-100);
    margin-bottom: 4px;
  }
  .promo h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink-100);
    letter-spacing: -0.01em;
  }
  .promo p {
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--stone-100);
    line-height: 1.5;
  }
  .promo-cta {
    align-self: flex-start;
    text-decoration: none;
  }

  /* ---------- Back-to-top floating button ---------- */
  .to-top {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 50%;
    background: var(--ink-100);
    color: var(--white);
    border: 0;
    cursor: pointer;
    display: grid;
    place-items: center;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    z-index: 20;
  }
  .to-top.is-visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .to-top svg { width: 18px; height: 18px; display: block; }
  .to-top:hover { background: var(--midnight-80); }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--stone-100);
  }
  .empty strong {
    display: block;
    color: var(--ink-100);
    font-size: 18px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  mark { background: var(--cyan-10); color: inherit; padding: 0 1px; border-radius: 2px; }

  /* Inline SVG symbols use currentColor */
  .icon-svg { width: 100%; height: 100%; display: block; }
</style>
</head>

<div class="wrap">

  <div class="sticky-header">
    <div class="controls">
      <label class="search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input id="q" type="search" placeholder="Search" autocomplete="off" spellcheck="false">
      </label>
      <label class="btn btn-tertiary btn-lg select-btn">
        <span id="sort-label">Sort</span>
        <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        <select id="sort" aria-label="Sort">
          <option value="default">Sort</option>
          <option value="az">Name A → Z</option>
          <option value="za">Name Z → A</option>
          <option value="status">By status</option>
        </select>
      </label>
      <button id="clear" class="btn btn-tertiary btn-lg" type="button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        Clear
      </button>
    </div>

    <div class="tabs-row">
      <button id="tabs-left" class="btn btn-tertiary tab-scroll" type="button" aria-label="Scroll tags left" hidden>
        <svg aria-hidden="true"><use href="#icon-arrow-left"/></svg>
      </button>
      <div id="tabs" class="tabs" role="tablist"></div>
      <button id="tabs-right" class="btn btn-tertiary tab-scroll" type="button" aria-label="Scroll tags right">
        <svg aria-hidden="true"><use href="#icon-arrow-right"/></svg>
      </button>
    </div>

    <div id="statuses" class="statuses"></div>
  </div>

  <div class="meta">
    <div><span id="count" class="count-big">0</span> <span id="count-suffix">features</span></div>
  </div>

  <div id="grid" class="grid"></div>
  <div class="load-more-wrap">
    <button id="load-more" class="btn btn-tertiary btn-lg" type="button" hidden>Load more</button>
  </div>
  <div id="empty" class="empty" hidden>
    <strong>No features match your filters</strong>
    <span>Try clearing a filter or searching for something else.</span>
  </div>

  <div class="promos">

ts book appointments by phone through an AI voice assistant.","tags":"bookings"},{"id":"20eb5d78-fcfc-4c1b-a532-fbc843f6abbe","status":"in development","name":"Gamification & Referrals","description":"Reward clients and grow your business with referral codes and redeemable rewards.","tags":"clients"},{"id":"8e9995cf-0155-4f28-82d2-c0ba66e272ee","status":"in development","name":"Custom Branding","description":"Customise your business look with your own branding, colours, and logo — shown to clients across AllSet.","tags":"setup, clients"},{"id":"c0950810-206b-4258-9d0b-124196f3bc1a","status":"planner","name":"External System Integrations","description":"Connect AllSet with your CRM, webhooks, and third-party tools through a flexible integration framework.","tags":"integrations, operations"},{"id":"ccdda8aa-7795-4eec-b723-352ad1585955","status":"planner","name":"iMessage Channel","description":"AllSet for iMessage — bringing the same booking, payment, and follow-up experience to Apple's messaging platform.","tags":"bookings, payments, follow-ups"},{"id":"9cd820b0-0f0c-485b-a957-0cf82617aaa5","status":"live","name":"Subscription Self-Service in Chat","description":"Clients can manage their own subscription directly in WhatsApp. If they message about cancelling, changing their plan, or updating payment details, AllSet sends them a secure link to do it themselves — no interruption to you.","tags":""},{"id":"08cd8e2a-ecc1-435c-b262-9427bf0fa6f4","status":"beta","name":"Engagement Template Library","description":"25 ready-to-use follow-up templates covering post-session feedback, re-engagement, goal reviews, wellness check-ins, referral requests, and more. Pick one, customise it, and launch — no starting from scratch.","tags":""}];
const STATUS_RENAME = { 'in development': 'dev', 'planner': 'pipeline' };
const FEATURES = RAW_FEATURES.map(f => ({
  ...f,
  status: STATUS_RENAME[f.status] || f.status
}));

// ---------- State ----------
const state = {
  q: '',
  tags: new Set(),     // empty = All
  statuses: new Set(),
  sort: 'default'
};

// ---------- Proper nouns for sentence-case conversion ----------
const PROPER_NOUNS = {
  'allset':'AllSet','whatsapp':'WhatsApp','imessage':'iMessage',
  'google':'Google','outlook':'Outlook','stripe':'Stripe','apple':'Apple',
  'id':'ID','crm':'CRM','ai':'AI','totp':'TOTP','qr':'QR','pa':'PA',
  'sms':'SMS','pdf':'PDF','csv':'CSV','api':'API'
};

// Sentence case: first word initial capital, rest lowercase, proper nouns preserved
function toSentenceCase(str) {
  if (!str) return str;
  const parts = str.split(/(\s+|[—:–\-\/])/);
  let firstWordFound = false;
  return parts.map(part => {
    if (/^\s+$/.test(part) || /^[—:–\-\/]$/.test(part) || part === '') return part;
    const proper = PROPER_NOUNS[part.toLowerCase()];
    if (proper) { firstWordFound = true; return proper; }
    if (!firstWordFound) {
      firstWordFound = true;
      return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
    }
    return part.toLowerCase();
  }).join('');
}

// Tag label: proper-noun if known, else capitalize first letter
function displayTag(tag) {
  const proper = PROPER_NOUNS[tag.toLowerCase()];
  return proper || (tag.charAt(0).toUpperCase() + tag.slice(1));
}

function displayStatus(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ---------- Derive ----------
const allTags = (() => {
  const counts = new Map();
  FEATURES.forEach(f => {
    (f.tags || '').split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
      counts.set(t, (counts.get(t) || 0) + 1);
    });
  });
  return [...counts.entries()].sort((a,b) => b[1] - a[1]);
})();

const STATUS_ORDER = ['live','beta','dev','pipeline'];
const allStatuses = STATUS_ORDER.filter(s => FEATURES.some(f => f.status === s));

// ---------- Renderers ----------
const tabsEl = document.getElementById('tabs');
const statusEl = document.getElementById('statuses');
const gridEl = document.getElementById('grid');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const suffixEl = document.getElementById('count-suffix');
const clearBtn = document.getElementById('clear');
const loadMoreBtn = document.getElementById('load-more');
const tabsLeftBtn = document.getElementById('tabs-left');
const tabsRightBtn = document.getElementById('tabs-right');

// ---------- Pagination per breakpoint ----------
// Desktop (≥1280): 3 cols × 5 rows = 15; Laptop (≥1024): 3 × 6 = 18;
// Tablet  (≥810) : 2 cols × 5 rows = 10; Mobile: 8.
function getBaseLimit() {
  const w = window.innerWidth;
  if (w >= 1280) return 15;
  if (w >= 1024) return 18;
  if (w >= 810)  return 10;
  return 8;
}
let baseLimit = getBaseLimit();
state.displayLimit = baseLimit;

// On breakpoint change, reset limit back to that breakpoint's base
window.addEventListener('resize', () => {
  const next = getBaseLimit();
  if (next !== baseLimit) {
    baseLimit = next;
    state.displayLimit = baseLimit;
    render();
  }
});

// Reset pagination whenever a filter/sort/search changes
function applyFilterChange() {
  state.displayLimit = baseLimit;
  render();
}

function renderTabs() {
  // "All" is always Primary; its aria-pressed is cosmetic-only
  const parts = [`<button class="btn tab tab-all btn-primary" data-tag="all">All <span class="count">${FEATURES.length}</span></button>`];
  allTags.forEach(([tag, count]) => {
    const active = state.tags.has(tag);
    parts.push(`<button class="btn tab btn-tertiary" data-tag="${tag}" aria-pressed="${active}">${displayTag(tag)} <span class="count">${count}</span></button>`);
  });
  tabsEl.innerHTML = parts.join('');
}

function renderStatuses() {
  const parts = allStatuses.map(s => {
    const pressed = state.statuses.has(s);
    return `<button class="badge" data-status="${s}" aria-pressed="${pressed}">${displayStatus(s)}</button>`;
  });
  statusEl.innerHTML = parts.join('');
}

function filtered() {
  const q = state.q.trim().toLowerCase();
  let list = FEATURES.filter(f => {
    if (state.tags.size) {
      const featureTags = (f.tags || '').split(',').map(t => t.trim());
      for (const t of state.tags) {
        if (!featureTags.includes(t)) return false;
      }
    }
    if (state.statuses.size && !state.statuses.has(f.status)) return false;
    if (q) {
      const hay = (f.name + ' ' + f.description + ' ' + (f.tags || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  switch (state.sort) {
    case 'az': list = [...list].sort((a,b) => a.name.localeCompare(b.name)); break;
    case 'za': list = [...list].sort((a,b) => b.name.localeCompare(a.name)); break;
    case 'status': {
      const order = Object.fromEntries(STATUS_ORDER.map((s,i) => [s,i]));
      list = [...list].sort((a,b) => (order[a.status]??9) - (order[b.status]??9) || a.name.localeCompare(b.name));
      break;
    }
  }
  return list;
}

function render() {
  const list = filtered();
  const total = list.length;
  const shown = Math.min(total, state.displayLimit);
  const visible = list.slice(0, shown);

  if (total === 0) {
    countEl.textContent = '0';
    suffixEl.textContent = 'features';
  } else if (shown < total) {
    countEl.textContent = shown;
    suffixEl.textContent = `of ${total} features`;
  } else {
    countEl.textContent = total;
    suffixEl.textContent = total === 1 ? 'feature' : 'features';
  }

  if (total === 0) {
    gridEl.innerHTML = '';
    emptyEl.hidden = false;
  } else {
    emptyEl.hidden = true;
    const q = state.q.trim();
    gridEl.innerHTML = visible.map(f => cardHTML(f, q)).join('');
  }

  loadMoreBtn.hidden = shown >= total;

  tabsEl.querySelectorAll('.tab').forEach(btn => {
    if (btn.dataset.tag === 'all') return; // All stays Primary always
    const active = state.tags.has(btn.dataset.tag);
    btn.setAttribute('aria-pressed', active);
  });
  statusEl.querySelectorAll('.badge').forEach(btn => {
    btn.setAttribute('aria-pressed', state.statuses.has(btn.dataset.status));
  });

  const anyFilter = state.q || state.tags.size || state.statuses.size || state.sort !== 'default';
  clearBtn.disabled = !anyFilter;
}

function iconIdFor(status) {
  return status === 'live' ? 'icon-chat-done' : 'icon-chat-clear';
}

function cardHTML(f, q) {
  const tags = (f.tags || '').split(',').map(t => t.trim()).filter(Boolean);
  const title = toSentenceCase(f.name);
  const desc = f.description || '';
  return `
    <article class="card" data-status="${f.status}">
      <div class="card-head">
        <svg class="status-icon" aria-hidden="true"><use href="#${iconIdFor(f.status)}"/></svg>
        <h3 class="card-title">${highlight(title, q)}</h3>
      </div>
      <p class="card-desc">${highlight(desc, q)}</p>
      <div class="card-foot">
        <span class="badge" data-status="${f.status}">${displayStatus(f.status)}</span>
        ${tags.slice(0,3).map(t => `<span class="tag">${displayTag(t)}</span>`).join('')}
        ${tags.length > 3 ? `<span class="tag">+${tags.length-3}</span>` : ''}
      </div>
    </article>
  `;
}

function highlight(text, q) {
  const safe = escapeHTML(text);
  if (!q) return safe;
  const re = new RegExp('(' + escapeRegExp(q) + ')', 'ig');
  return safe.replace(re, '<mark>$1</mark>');
}

document.getElementById('q').addEventListener('input', e => {
  state.q = e.target.value;
  applyFilterChange();
});
document.getElementById('sort').addEventListener('change', e => {
  state.sort = e.target.value;
  document.getElementById('sort-label').textContent = e.target.selectedOptions[0].text;
  applyFilterChange();
});
tabsEl.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const tag = btn.dataset.tag;
  if (tag === 'all') {
    state.tags.clear();
  } else {
    if (state.tags.has(tag)) state.tags.delete(tag);
    else state.tags.add(tag);
  }
  applyFilterChange();
});
statusEl.addEventListener('click', e => {
  const btn = e.target.closest('.badge');
  if (!btn) return;
  const s = btn.dataset.status;
  if (state.statuses.has(s)) state.statuses.delete(s);
  else state.statuses.add(s);
  applyFilterChange();
});
clearBtn.addEventListener('click', () => {
  state.q = '';
  state.tags.clear();
  state.statuses.clear();
  state.sort = 'default';
  document.getElementById('q').value = '';
  document.getElementById('sort').value = 'default';
  document.getElementById('sort-label').textContent = 'Sort';
  applyFilterChange();
});
loadMoreBtn.addEventListener('click', () => {
  state.displayLimit += baseLimit;
  render();
});

// ---------- Tab scroll arrows ----------
function updateTabArrows() {
  const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
  // Hide both arrows if nothing to scroll
  if (maxScroll <= 1) {
    tabsLeftBtn.hidden = true;
    tabsRightBtn.hidden = true;
    return;
  }
  tabsLeftBtn.hidden = tabsEl.scrollLeft <= 0;
  tabsRightBtn.hidden = tabsEl.scrollLeft >= maxScroll - 1;
}
tabsLeftBtn.addEventListener('click', () => {
  tabsEl.scrollBy({ left: -Math.max(160, tabsEl.clientWidth * 0.6), behavior: 'smooth' });
});
tabsRightBtn.addEventListener('click', () => {
  tabsEl.scrollBy({ left: Math.max(160, tabsEl.clientWidth * 0.6), behavior: 'smooth' });
});
tabsEl.addEventListener('scroll', updateTabArrows);
window.addEventListener('resize', updateTabArrows);

function escapeHTML(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

renderTabs();
renderStatuses();
render();
updateTabArrows();

// ---------- Back-to-top button ----------
const toTopBtn = document.getElementById('to-top');
const scrollContainer = document.querySelector('.wrap');
function updateToTopVisibility() {
  if (scrollContainer.scrollTop > 200) {
    toTopBtn.classList.add('is-visible');
  } else {
    toTopBtn.classList.remove('is-visible');
  }
}
scrollContainer.addEventListener('scroll', updateToTopVisibility);
toTopBtn.addEventListener('click', () => {
  scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
